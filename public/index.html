<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image to OCR Converter (MAD NIKE Ed.)</title>
    <script src="https://unpkg.com/tailwindcss-cdn@3.4.3/tailwindcss.js"></script>
    <script src="https://unpkg.com/@panzoom/panzoom@4.5.1/dist/panzoom.min.js"></script>
</head>

<body class="bg-gray-100 min-h-screen p-4">

    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-bold text-gray-800 mb-6 text-center pt-8">OCR Утилита: Пакетная AI-обработка</h1>

        <div class="bg-white p-6 rounded-xl shadow-sm mb-8 border border-gray-200">
            <form id="uploadForm" class="space-y-4">
                <div class="flex items-center justify-center w-full">
                    <label for="dropzone-file"
                        class="flex flex-col items-center justify-center w-full h-32 border-2 border-blue-300 border-dashed rounded-lg cursor-pointer bg-blue-50 hover:bg-blue-100 transition">
                        <div class="flex flex-col items-center justify-center pt-5 pb-6">
                            <svg class="w-8 h-8 mb-3 text-blue-500" aria-hidden="true"
                                xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 20 16">
                                <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"
                                    stroke-width="2"
                                    d="M13 13h3a3 3 0 0 0 0-6h-.025A5.56 5.56 0 0 0 16 6.5 5.5 5.5 0 0 0 5.207 5.021C5.137 5.017 5.071 5 5 5a4 4 0 0 0 0 8h2.167M10 15V6m0 0L8 8m2-2 2 2" />
                            </svg>
                            <p class="mb-1 text-sm text-gray-500"><span class="font-semibold">Выберите файлы</span> или
                                перетащите их сюда</p>
                            <p class="text-xs text-gray-500">Можно загрузить сразу несколько (PNG, JPG)</p>
                        </div>
                        <input id="dropzone-file" type="file" name="images" class="hidden" accept="image/*" multiple
                            required />
                    </label>
                </div>

                <button type="submit" id="submitBtn"
                    class="w-full text-white bg-black hover:bg-gray-800 focus:ring-4 focus:outline-none focus:ring-gray-300 font-medium rounded-lg text-lg px-5 py-3 text-center transition shadow-lg">
                    Запустить AI-распознавание (Groq)
                </button>
            </form>
        </div>

        <div id="resultsGrid" class="space-y-6 pb-12">
        </div>
    </div>

    <script>
        const form = document.getElementById('uploadForm');
        const fileInput = document.getElementById('dropzone-file');
        const resultsGrid = document.getElementById('resultsGrid');
        const submitBtn = document.getElementById('submitBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const files = fileInput.files;
            if (files.length === 0) return;

            // Очищаем старые результаты
            resultsGrid.innerHTML = '';
            submitBtn.disabled = true;
            submitBtn.innerText = 'Обработка через Groq...';

            // Создаем массив промисов для параллельной отправки
            const uploadPromises = Array.from(files).map((file, index) => {
                return processSingleFile(file, index);
            });

            // Ждем завершения всех
            await Promise.all(uploadPromises);

            submitBtn.disabled = false;
            submitBtn.innerText = 'Запустить AI-распознавание (Groq)';
            fileInput.value = ''; // Сбрасываем инпут
        });

        async function processSingleFile(file, index) {
            const cardId = `card-${index}`;
            const previewUrl = URL.createObjectURL(file);

            const cardHTML = `
                <div id="${cardId}" class="bg-white p-4 rounded-xl shadow-sm flex flex-col md:flex-row gap-4 border border-gray-200">
                    <div class="w-full md:w-1/2 flex flex-col">
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-xs text-gray-400 font-mono truncate">${file.name}</span>
                            <span class="text-xs text-gray-400 bg-gray-100 px-2 py-1 rounded">Колесико — зум, мышь — двигать</span>
                        </div>
                        <div class="bg-gray-100 rounded-lg border border-gray-300 overflow-hidden h-[400px] relative flex items-center justify-center cursor-move" id="${cardId}-img-container">
                           <img src="${previewUrl}" id="${cardId}-img" class="max-h-full max-w-full object-contain" alt="preview">
                        </div>
                    </div>
                    
                    <div class="w-full md:w-1/2 flex flex-col">
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-sm font-semibold text-gray-700 status-badge">Распознавание...</span>
                            <button onclick="copyText('${cardId}-text')" class="text-xs bg-gray-100 hover:bg-blue-50 hover:text-blue-600 font-medium text-gray-700 px-3 py-1 rounded transition hidden copy-btn">
                                Копировать текст
                            </button>
                        </div>
                        <textarea id="${cardId}-text" class="w-full h-[400px] p-4 text-sm text-gray-800 bg-gray-50 rounded-lg border border-gray-300 focus:ring-black focus:border-black resize-none" placeholder="Нейросеть анализирует текст..."></textarea>
                    </div>
                </div>
            `;
            resultsGrid.insertAdjacentHTML('beforeend', cardHTML);

            const cardElement = document.getElementById(cardId);
            const textarea = document.getElementById(`${cardId}-text`);
            const statusBadge = cardElement.querySelector('.status-badge');
            const copyBtn = cardElement.querySelector('.copy-btn');

            // --- ИНИЦИАЛИЗАЦИЯ ZOOM & PAN ---
            const imgElement = document.getElementById(`${cardId}-img`);
            const imgContainer = document.getElementById(`${cardId}-img-container`);

            const panzoom = Panzoom(imgElement, {
                maxScale: 10, // Максимальное увеличение (x10)
                minScale: 1,  // Минимальное (исходник)
                contain: 'outside' // Чтобы картинка не улетала слишком далеко за пределы контейнера
            });

            // Зум на колесико мыши
            imgContainer.addEventListener('wheel', panzoom.zoomWithWheel);

            // Двойной клик для сброса зума
            imgContainer.addEventListener('dblclick', () => {
                panzoom.reset();
            });
            // --------------------------------

            const formData = new FormData();
            formData.append('image', file);

            try {
                const response = await fetch('/upload', { method: 'POST', body: formData });
                const data = await response.json();

                if (response.ok) {
                    textarea.value = data.text;
                    statusBadge.innerText = 'Успешно (Llama 3)';
                    statusBadge.classList.add('text-green-600');
                    copyBtn.classList.remove('hidden');
                } else {
                    textarea.value = `Ошибка: ${data.error}`;
                    statusBadge.innerText = 'Ошибка';
                    statusBadge.classList.add('text-red-500');
                }
            } catch (err) {
                textarea.value = 'Сбой сети или сервера.';
                statusBadge.innerText = 'Ошибка соединения';
                statusBadge.classList.add('text-red-500');
            }
        }

        // Функция копирования в буфер обмена
        window.copyText = function (elementId) {
            const textarea = document.getElementById(elementId);
            textarea.select();
            document.execCommand('copy');
            window.getSelection().removeAllRanges();

            // Визуальный фидбек на кнопке
            const btn = document.querySelector(`button[onclick="copyText('${elementId}')"]`);
            const originalText = btn.innerText;
            btn.innerText = 'Скопировано!';
            btn.classList.add('bg-green-100', 'text-green-700');

            setTimeout(() => {
                btn.innerText = originalText;
                btn.classList.remove('bg-green-100', 'text-green-700');
            }, 2000);
        }
    </script>
</body>

</html>
